apiVersion: v1
kind: Service
metadata:
  name: postgres-hostpath
  namespace: storage-lab
spec:
  clusterIP: None
  selector:
    app: postgres-hostpath
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-hostpath
  namespace: storage-lab
spec:
  serviceName: postgres-hostpath
  replicas: 1
  selector:
    matchLabels:
      app: postgres-hostpath
  template:
    metadata:
      labels:
        app: postgres-hostpath
    spec:
      containers:
        - name: postgres
          image: postgres:17
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_PASSWORD
              value: password123
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-hostpath-pvc
